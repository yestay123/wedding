<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <!-- Stop Android Chrome / iOS from auto-detecting dates & numbers in text
         (it was wrapping "23 августа 2026" and misparsing it as September). -->
    <meta name="format-detection" content="telephone=no, date=no, address=no, email=no" />
    <meta name="theme-color" content="#ffffff" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600&family=Libertinus+Serif+Display&family=Montserrat:wght@500;600&family=Playfair+Display:wght@500;600&display=swap"
      rel="stylesheet"
    />
    <title>Темирлан и Аруна</title>
    <meta name="description" content="Приглашают Вас на свою свадьбу!" />
    <script>
      // Avoid a flash of the heavy serif fallback: reveal font-dependent text
      // only once web fonts are ready (resolves instantly on cached loads).
      document.documentElement.classList.add('fonts-loading');
      if (document.fonts && document.fonts.ready) {
        document.fonts.ready.then(function () {
          document.documentElement.classList.remove('fonts-loading');
        });
      } else {
        document.documentElement.classList.remove('fonts-loading');
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
